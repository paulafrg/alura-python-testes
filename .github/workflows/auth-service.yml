name: Teste Auth Service
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
    test-auth-service:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout de codigo
          uses: actions/chekout@v4

        - name: Configurar Python 3.12.3
          uses: actions/setup-python@v4
          with:
            python-version: '3.12.3'