name: Teste Auth Service
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
    test-auth-service:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout de codigo
          uses: actions/checkout@v4

        - name: Configurar Python 3.12.3
          uses: actions/setup-python@v4
          with:
            python-version: '3.12.3'

        - name: Install dependencies
          working-directory: ./burguer-app/auth-service
          run: |
            pip install -r requirements.txt

        - name: Rodar testes
          run: |
            cd ./burguer-app/auth-service
            pytest -v --cov=models --cov=services --cov=config --cov=controllers --cov=utils --cov-report=xml:coverage.xml --cov-report=html:coverage_html_report